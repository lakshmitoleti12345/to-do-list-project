<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>To-Do List</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>

        <form action="/add" method="POST">
            <input type="text" name="title" placeholder="Task Title" required>
            <input type="datetime-local" name="due_date" required>
            <button type="submit">Add Task</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li class="{{ 'overdue' if task.due_date < now and not task.completed else '' }}">
                
                <input type="checkbox" onchange="updateTask({{ task.id }})"
                {% if task.completed %}checked{% endif %}>

                <span>
                    {{ task.title }} |
                    Created: {{ task.created_date.strftime('%Y-%m-%d %H:%M') }} |
                    Due: {{ task.due_date.strftime('%Y-%m-%d %H:%M') }}
                </span>

                <form action="/edit/{{ task.id }}" method="POST" style="display:inline;">
                    <input type="text" name="title" value="{{ task.title }}">
                    <input type="datetime-local" name="due_date"
                    value="{{ task.due_date.strftime('%Y-%m-%dT%H:%M') }}">
                    <button type="submit">Edit</button>
                </form>

                <a href="/delete/{{ task.id }}">Delete</a>
            </li>
            {% endfor %}
        </ul>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
